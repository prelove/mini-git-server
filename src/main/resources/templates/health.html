<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="#{health.title} + ' - ' + #{ui.title}">System Health</title>
<style>body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f7fa;margin:0}.header{background:#2c3e50;color:#fff;padding:.7rem 1rem}.header-content,.nav-content,.container{max-width:980px;margin:0 auto}.header-content{display:flex;justify-content:space-between}.nav{background:#34495e}.nav-content{display:flex;gap:14px;padding:0 8px}.nav a{color:#fff;text-decoration:none;padding:.6rem 0}.nav a.active{color:#67b7ff}.container{padding:14px}.overall{background:#fff;padding:12px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-bottom:10px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}.card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.08)}.info{display:flex;justify-content:space-between;margin:6px 0;color:#555}.actions{margin-top:12px;display:flex;gap:8px}.btn{padding:.45rem .8rem;border-radius:6px;text-decoration:none;background:#3498db;color:#fff}.btn.secondary{background:#95a5a6}</style>
</head><body>
<header class="header"><div class="header-content"><h1 th:text="#{ui.title}">Mini Git Server</h1><a href="/admin" style="color:#fff" th:text="'← ' + #{ui.back.admin}">Back</a></div></header>
<nav class="nav"><div class="nav-content"><a href="/admin" th:text="#{ui.nav.repositories}">Repositories</a><a href="/admin/system" th:text="#{ui.nav.system}">System</a><a href="/actuator/health" class="active" th:text="#{ui.nav.health}">Health</a></div></nav>
<div class="container">
<div class="overall"><strong th:text="#{health.system.status}+': '"></strong><span th:text="${overallStatus}">UP</span><div style="font-size:.88rem;color:#666"><span th:text="#{health.checked.at}+': '"></span><span th:text="${checkTime}"></span></div></div>
<div class="grid">
<div class="card"><h3 th:text="'📚 ' + #{health.git.service}">Git Service</h3><div class="info"><span th:text="#{ui.storage.dir}"></span><span th:text="${storageDir}"></span></div><div class="info"><span th:text="#{ui.repo.count}"></span><span th:text="${repoCount}"></span></div><div class="info"><span th:text="#{health.service.version}"></span><span>1.0.0</span></div></div>
<div class="card"><h3 th:text="'💾 ' + #{ui.disk.space}">Disk</h3><div class="info"><span th:text="#{ui.total.space}"></span><span th:text="${totalSpace}"></span></div><div class="info"><span th:text="#{ui.used.space}"></span><span th:text="${usedSpace}"></span></div><div class="info"><span th:text="#{ui.free.space}"></span><span th:text="${freeSpace}"></span></div></div>
<div class="card"><h3 th:text="'🌐 ' + #{ui.network.status}">Network</h3><div class="info"><span th:text="#{health.service.status}"></span><span th:text="${pingStatus == 'UP' ? #messages.msg('health.healthy') : #messages.msg('health.unhealthy')}">Healthy</span></div><div class="info"><span th:text="#{health.response.time}"></span><span th:text="${responseTime}"></span></div></div>
</div>
<div class="actions"><a href="/actuator/health" class="btn" th:text="'🔄 ' + #{ui.refresh}">Refresh</a><a href="/actuator/health/json" class="btn secondary" target="_blank" th:text="'📋 ' + #{ui.view.json}">View JSON</a><a href="/admin" class="btn secondary" th:text="'🏠 ' + #{ui.return.home}">Home</a></div>
</div></body></html>
