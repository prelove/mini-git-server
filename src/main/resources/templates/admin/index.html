<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="#{ui.title} + ' - ' + #{ui.repositories}">Mini Git Server</title>
<style>body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f7fa;margin:0}.header{background:#2c3e50;color:#fff;padding:.7rem 1rem}.header-content,.nav-content,.container{max-width:980px;margin:0 auto}.header-content{display:flex;justify-content:space-between;gap:8px;align-items:center}.lang a{color:#fff;text-decoration:none;padding:2px 6px;border-radius:4px}.lang a.active{background:#3498db}.nav{background:#34495e}.nav-content{display:flex;gap:14px;padding:0 8px}.nav a{color:#fff;text-decoration:none;padding:.6rem 0}.nav a.active{color:#67b7ff}.container{padding:14px}.stats{display:grid;grid-template-columns:1fr 2fr;gap:10px;margin-bottom:10px}.card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.08)}.btn{background:#27ae60;color:#fff;padding:.5rem .8rem;border-radius:6px;text-decoration:none}.repo-list .head{background:#2c3e50;color:#fff;padding:10px;border-radius:8px 8px 0 0}.repo-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eef}.repo-box{background:#fff;border-radius:0 0 8px 8px;box-shadow:0 2px 6px rgba(0,0,0,.08)}</style>
<script>function confirmDelete(form){var msg=form.getAttribute('data-confirm');return msg?confirm(msg):confirm('Are you sure?');}</script>
</head><body>
<header class="header"><div class="header-content"><h1 th:text="#{ui.title}">Mini Git Server</h1><div><span class="lang"><a href="?lang=zh" th:classappend="${#locale.language == 'zh'} ? 'active'" th:text="#{ui.lang.zh}">中文</a><a href="?lang=en" th:classappend="${#locale.language == 'en'} ? 'active'" th:text="#{ui.lang.en}">EN</a><a href="?lang=ja" th:classappend="${#locale.language == 'ja'} ? 'active'" th:text="#{ui.lang.ja}">日本語</a></span> <span th:text="#{ui.welcome} + ', ' + ${username}"></span> <form th:action="@{/logout}" method="post" style="display:inline"><button style="border:none;background:#3498db;color:#fff;border-radius:4px;padding:4px 8px" th:text="#{ui.logout}"></button></form></div></div></header>
<nav class="nav"><div class="nav-content"><a href="/admin" class="active" th:text="#{ui.nav.repositories}">Repositories</a><a href="/admin/system" th:text="#{ui.nav.system}">System</a><a href="/actuator/health" th:text="#{ui.nav.health}">Health</a></div></nav>
<div class="container">
<div th:if="${success}" class="card" th:text="${success}"></div><div th:if="${error}" class="card" th:text="${error}"></div>
<div class="stats"><div class="card"><h3 th:text="#{ui.repo.count}"></h3><div th:text="${repoCount}" style="font-size:1.6rem;font-weight:700;color:#3498db"></div></div><div class="card"><h3 th:text="#{ui.storage.dir}"></h3><div th:text="${storageDir}" style="word-break:break-all"></div></div></div>
<div style="margin-bottom:10px"><a href="/admin/create" class="btn" th:text="'➕ ' + #{ui.create.repo}"></a></div>
<div class="repo-list"><div class="head" th:text="'📚 ' + #{ui.repo.list}"></div><div class="repo-box"><div th:if="${repositories.empty}" class="repo-item"><span th:text="#{repo.empty.hint}"></span></div><div th:each="repo : ${repositories}" class="repo-item"><span th:text="${repo}"></span><div style="display:flex;gap:6px;align-items:center"><a th:href="@{'/admin/repo/' + ${repo}}" th:text="'📋 ' + #{ui.repo.detail}"></a><form th:action="@{'/admin/repo/' + ${repo} + '/delete'}" method="post" style="display:inline" th:data-confirm="#{ui.delete.confirm}" onsubmit="return confirmDelete(this)"><button type="submit" style="border:none;background:#e74c3c;color:#fff;border-radius:4px;padding:4px 8px;cursor:pointer" th:text="#{ui.delete}"></button></form></div></div></div></div>
</div></body></html>
