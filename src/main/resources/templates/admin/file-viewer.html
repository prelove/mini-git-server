<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${fileName != null ? fileName : #messages.msg('file.preview')} + ' - Mini Git Server'">File Preview - Mini Git Server</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docx-preview@0.3.1/dist/docx-preview.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f6f8fa;
            color: #24292f;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top bar ─── */
        .top-bar {
            background: #2c3e50;
            color: #fff;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 1rem;
        }
        .top-bar a { color: #cdd9e5; text-decoration: none; font-size: 0.9rem; }
        .top-bar a:hover { color: #fff; }
        .top-bar-left { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; overflow: hidden; }
        .top-bar-left .repo-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ─── Page layout ─── */
        .page-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 260px;
            min-width: 180px;
            background: #fff;
            border-right: 1px solid #d0d7de;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 0.55rem 0.85rem;
            background: #f6f8fa;
            border-bottom: 1px solid #d0d7de;
            font-size: 0.82rem;
            font-weight: 600;
            color: #57606a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tree-list {
            flex: 1;
            overflow-y: auto;
        }
        .tree-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.85rem;
            text-decoration: none;
            color: #24292f;
            border-bottom: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .tree-item:hover { background: #f3f4f6; }
        .tree-item.active {
            background: #dbeafe;
            color: #1a73e8;
            font-weight: 600;
        }
        .tree-item .icon { flex-shrink: 0; }

        /* ─── Main content ─── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── File info bar ─── */
        .file-info-bar {
            background: #fff;
            border-bottom: 1px solid #d0d7de;
            padding: 0.65rem 1.1rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            flex-shrink: 0;
        }
        .breadcrumb {
            flex: 1;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .breadcrumb a {
            color: #0969da;
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb .sep { color: #8c959f; margin: 0 0.2rem; }
        .file-meta {
            font-size: 0.82rem;
            color: #57606a;
            white-space: nowrap;
        }
        .actions {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #f6f8fa;
            color: #24292f;
            border: 1px solid #d0d7de;
            padding: 0.3rem 0.75rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn:hover { background: #eaeef2; }
        .btn.primary {
            background: #0969da;
            color: #fff;
            border-color: #0969da;
        }
        .btn.primary:hover { background: #0550ae; }

        /* ─── Preview area ─── */
        .preview-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem 2rem;
        }

        /* ─── Code / text preview ─── */
        .code-wrap {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            overflow: hidden;
        }
        .code-line-nums {
            display: flex;
        }
        pre {
            margin: 0;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.88rem;
            line-height: 1.6;
            background: #fff;
        }
        pre code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }

        /* ─── Markdown body ─── */
        .markdown-body {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1.5rem 2rem;
            line-height: 1.7;
            font-size: 1rem;
        }
        .markdown-body h1, .markdown-body h2 {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 0.4rem;
            margin: 1.2rem 0 0.6rem;
        }
        .markdown-body h3, .markdown-body h4 { margin: 1rem 0 0.5rem; }
        .markdown-body p { margin: 0.6rem 0; }
        .markdown-body pre {
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }
        .markdown-body code {
            background: #f6f8fa;
            border-radius: 3px;
            padding: 0.15em 0.4em;
            font-size: 0.88em;
            font-family: 'SFMono-Regular', Consolas, monospace;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
        }
        .markdown-body blockquote {
            border-left: 4px solid #d0d7de;
            padding-left: 1rem;
            color: #57606a;
            margin: 0.75rem 0;
        }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; }
        .markdown-body th, .markdown-body td { border: 1px solid #d0d7de; padding: 0.4rem 0.8rem; }
        .markdown-body th { background: #f6f8fa; }
        .markdown-body a { color: #0969da; }
        .markdown-body ul, .markdown-body ol { padding-left: 2rem; margin: 0.5rem 0; }
        .markdown-body img { max-width: 100%; }
        .markdown-body hr { border: none; border-top: 1px solid #d0d7de; margin: 1.5rem 0; }

        /* ─── Image preview ─── */
        .image-wrap {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
        }
        .image-wrap img { max-width: 100%; border-radius: 4px; }

        /* ─── PDF ─── */
        .pdf-frame {
            width: 100%;
            height: 75vh;
            border: 1px solid #d0d7de;
            border-radius: 6px;
        }

        /* ─── Office docs ─── */
        .docx-wrapper {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1rem;
        }
        .excel-container { display: flex; flex-direction: column; gap: 1rem; }
        .excel-container table { border-collapse: collapse; width: 100%; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; }
        .excel-container th, .excel-container td { border: 1px solid #d0d7de; padding: 0.35rem 0.6rem; font-size: 0.88rem; }
        .excel-container th { background: #f6f8fa; }

        .office-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 240px;
            color: #57606a;
            font-size: 1rem;
        }

        /* ─── Alerts / notes ─── */
        .alert {
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        .alert-warn { background: #fff8c5; border: 1px solid #d4a72c; color: #7d4e00; }
        .alert-info { background: #ddf4ff; border: 1px solid #54aeff; color: #0550ae; }

        /* ─── Unsupported ─── */
        .unsupported-box {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 2rem;
            text-align: center;
            color: #57606a;
        }
        .unsupported-box h3 { margin-bottom: 0.75rem; color: #24292f; }
        .unsupported-box .action-row { margin-top: 1.25rem; display: flex; justify-content: center; gap: 0.75rem; }

        /* ─── Mermaid diagrams ─── */
        .mermaid { text-align: center; margin: 0.75rem 0; }
        .mermaid svg { max-width: 100%; }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            .sidebar { display: none; }
            body { overflow: auto; height: auto; }
            .page-layout { flex-direction: column; }
            .main-content { overflow: visible; }
            .preview-area { overflow: visible; }
        }
    </style>
</head>
<body>

<!-- ═══ Top bar ═══ -->
<div class="top-bar">
    <div class="top-bar-left">
        <span>📁</span>
        <span class="repo-name" th:text="${repoName}">repository.git</span>
        <span th:if="${branch != null}" style="color:#8b949e;">›</span>
        <span th:if="${branch != null}" style="color:#cdd9e5;" th:text="${branch}">main</span>
    </div>
    <div>
        <a th:if="${backUrl != null}" th:href="${backUrl}">← <span th:text="#{ui.back.repo}">Back</span></a>
    </div>
</div>

<!-- ═══ Two-panel layout ═══ -->
<div class="page-layout">

    <!-- Sidebar: file tree of the current directory -->
    <aside class="sidebar">
        <div class="sidebar-header"
             th:text="${sidebarDirPath != null and !sidebarDirPath.isEmpty()} ? '📂 ' + sidebarDirPath : '📂 /'">
            📂 /
        </div>
        <div class="tree-list">
            <!-- Back to parent directory -->
            <a th:if="${sidebarDirPath != null and !sidebarDirPath.isEmpty()}"
               th:href="@{|/admin/repo/${repoName}?branch=${branch}${sidebarParentPath != null and !sidebarParentPath.isEmpty() ? '&path=' + sidebarParentPath : ''}|}"
               class="tree-item">
                <span class="icon">🔙</span><span>..</span>
            </a>
            <!-- Directory and file entries -->
            <a th:each="f : ${sidebarFiles}"
               th:href="${f.type == 'directory'
                   ? '/admin/repo/' + repoName + '?branch=' + (branch != null ? branch : '') + '&path=' + f.path
                   : '/admin/repo/' + repoName + '/file?path=' + f.path + (branch != null ? '&branch=' + branch : '')}"
               th:class="${f.type == 'directory' ? 'tree-item' : (f.name == fileName ? 'tree-item active' : 'tree-item')}"
               th:target="${f.type == 'directory' ? '_self' : '_blank'}"
               th:rel="${f.type == 'directory' ? '' : 'noopener'}">
                <span class="icon" th:text="${f.type == 'directory' ? '📁' : '📄'}">📄</span>
                <span th:text="${f.name}">file.txt</span>
            </a>
        </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content">

        <!-- File info bar -->
        <div class="file-info-bar">
            <!-- Breadcrumb path -->
            <div class="breadcrumb">
                <a th:href="@{|/admin/repo/${repoName}${branch != null ? '?branch=' + branch : ''}|}"
                   th:text="${repoName}">repo</a>
                <span th:each="crumb, iter : ${filePath.split('/')}" th:if="${!filePath.isEmpty()}">
                    <span class="sep">/</span>
                    <span th:if="${iter.last}" style="font-weight:600;" th:text="${crumb}">file</span>
                    <span th:if="${!iter.last}" th:text="${crumb}">dir</span>
                </span>
            </div>

            <!-- File metadata -->
            <div class="file-meta">
                <span th:text="${fileSizeFormatted}">1.2 KB</span>
                <span th:if="${detectedCharset != null}"
                      th:text="' · ' + #{file.encoding} + ': ' + ${detectedCharset}"></span>
            </div>

            <!-- Action buttons -->
            <div class="actions">
                <a th:href="${rawUrl}" class="btn" target="_blank" rel="noopener">
                    <span th:text="#{file.view.raw}">Raw</span>
                </a>
                <a th:href="${downloadUrl}" class="btn primary">
                    ⬇ <span th:text="#{file.download}">Download</span>
                </a>
            </div>
        </div>

        <!-- Alerts -->
        <div class="preview-area">
            <div th:if="${tooLargeForInline}" class="alert alert-warn" th:text="#{file.note.large}"></div>
            <div th:if="${binaryDetected}" class="alert alert-warn" th:text="#{file.note.binary}"></div>

            <!-- ── Inline previews ── -->
            <div th:if="${previewAvailable and inlinePreview}" th:switch="${previewType}">

                <!-- Plain text -->
                <div th:case="'text'" class="code-wrap">
                    <pre><code th:class="${highlightLanguage != null} ? 'hljs ' + highlightLanguage : 'hljs'" th:text="${textContent}"></code></pre>
                </div>

                <!-- Markdown -->
                <div th:case="'markdown'">
                    <article class="markdown-body" th:utext="${markdownHtml}"></article>
                </div>

                <!-- Image -->
                <div th:case="'image'" class="image-wrap">
                    <img th:src="${imageData}" alt="image preview"/>
                </div>

                <!-- PDF -->
                <div th:case="'pdf'">
                    <iframe th:src="${pdfData}" class="pdf-frame"></iframe>
                </div>

                <!-- Other inline (fallback) -->
                <div th:case="*" class="unsupported-box">
                    <p th:text="#{file.inline.unsupported}">unsupported</p>
                </div>
            </div>

            <!-- ── Office documents (client-side rendering) ── -->
            <div th:if="${clientRenderOffice}">
                <div id="office-status" class="office-progress" th:text="#{file.office.loading}">Loading…</div>
                <div th:if="${previewType == 'word'}" id="docx-container" class="docx-wrapper" style="display:none;"></div>
                <div th:if="${previewType == 'excel'}" id="excel-container" class="excel-container" style="display:none;"></div>
                <div th:if="${previewType == 'powerpoint'}" id="ppt-container" class="docx-wrapper" style="display:none;"></div>

                <!-- Fallback -->
                <div id="office-fallback" style="display:none;" class="unsupported-box">
                    <h3>📄 <span th:text="#{file.office.info}">Office Document Info</span></h3>
                    <p th:text="|${#messages.msg('file.office.filename')}: ${fileName}|"></p>
                    <p th:text="|${#messages.msg('file.office.filesize')}: ${fileSizeFormatted}|"></p>
                    <p th:text="|${#messages.msg('file.office.filetype')}: ${previewType}|"></p>
                    <div class="alert alert-info" style="margin-top:1rem; text-align:left;">
                        <strong>💡 <span th:text="#{file.office.tips}">Tips</span></strong><br/>
                        • <span th:text="#{file.office.tip1}">tip1</span><br/>
                        • <span th:text="#{file.office.tip2}">tip2</span><br/>
                        • <span th:text="#{file.office.tip3}">tip3</span>
                    </div>
                    <div class="action-row">
                        <a th:href="${downloadUrl}" class="btn primary">📥 <span th:text="#{file.office.download.now}">Download now</span></a>
                        <a th:href="${rawUrl}" class="btn" target="_blank">🔍 <span th:text="#{file.office.view.raw}">View raw</span></a>
                    </div>
                </div>
            </div>

            <!-- ── No preview available ── -->
            <div th:if="${!previewAvailable and !tooLargeForInline and !binaryDetected}" class="unsupported-box">
                <h3>📄 <span th:text="${fileName}">file.bin</span></h3>
                <p th:text="#{file.preview.unsupported}">unsupported</p>
                <p style="margin-top:0.35rem; font-size:0.85rem;" th:text="#{file.preview.actions}">actions</p>
                <div class="action-row">
                    <a th:href="${downloadUrl}" class="btn primary">⬇ <span th:text="#{file.download}">Download</span></a>
                    <a th:href="${rawUrl}" class="btn" target="_blank">🔍 <span th:text="#{file.view.raw}">Raw</span></a>
                </div>
            </div>
        </div><!-- /preview-area -->
    </main>
</div><!-- /page-layout -->

<!-- CDN scripts -->
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.1/dist/docx-preview.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxjs@2.12.0/dist/pptxjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<script th:inline="javascript">
    // ── Syntax highlighting ──
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('pre code.hljs').forEach(function (block) {
            if (window.hljs) window.hljs.highlightElement(block);
        });

        // ── Mermaid: convert fenced code blocks inside markdown to diagrams ──
        document.querySelectorAll('.markdown-body pre code.language-mermaid').forEach(function (el) {
            var pre = el.parentElement;
            var div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = el.textContent;
            pre.parentNode.replaceChild(div, pre);
        });
        if (window.mermaid) {
            mermaid.initialize({ startOnLoad: true, securityLevel: 'strict' });
        }
    });

    // ── Office client-side rendering ──
    var clientRenderOffice = /*[[${clientRenderOffice}]]*/ false;
    var rawUrl             = /*[[${rawUrl}]]*/ '';
    var previewType        = /*[[${previewType}]]*/ 'binary';

    function showFallback() {
        var s = document.getElementById('office-status');
        var f = document.getElementById('office-fallback');
        if (s) s.style.display = 'none';
        if (f) f.style.display = 'block';
    }

    function showContainer(id) {
        var s = document.getElementById('office-status');
        var c = document.getElementById(id);
        if (s) s.style.display = 'none';
        if (c) c.style.display = 'block';
    }

    if (clientRenderOffice && rawUrl) {
        var libOk = (previewType === 'word'       && !!window.docx && typeof window.docx.renderAsync === 'function') ||
                    (previewType === 'excel'      && !!window.XLSX && typeof window.XLSX.read === 'function')         ||
                    (previewType === 'powerpoint' && !!window.PPTX && typeof window.PPTX.load === 'function');

        if (!libOk) { showFallback(); }
        else {
            fetch(rawUrl)
                .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.arrayBuffer(); })
                .then(function (buf) {
                    if (!buf || buf.byteLength === 0) throw new Error('Empty file');
                    if (previewType === 'word') {
                        window.docx.renderAsync(buf, document.getElementById('docx-container'), null, { experimental: true })
                            .then(function () { showContainer('docx-container'); })
                            .catch(showFallback);
                    } else if (previewType === 'excel') {
                        try {
                            var wb = window.XLSX.read(buf, { type: 'array', cellFormula: false, cellHTML: false });
                            var con = document.getElementById('excel-container');
                            con.innerHTML = '';
                            var ok = false;
                            wb.SheetNames.forEach(function (name, i) {
                                var sh = wb.Sheets[name];
                                if (sh) {
                                    var html = window.XLSX.utils.sheet_to_html(sh, {
                                        header: '<h4>Sheet ' + (i + 1) + ': ' + name + '</h4>'
                                    });
                                    var sec = document.createElement('section');
                                    sec.innerHTML = html;
                                    con.appendChild(sec);
                                    ok = true;
                                }
                            });
                            if (ok) showContainer('excel-container'); else throw new Error('No sheets');
                        } catch (e) { showFallback(); }
                    } else if (previewType === 'powerpoint') {
                        var blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
                        var url  = URL.createObjectURL(blob);
                        window.PPTX.load(url, '#ppt-container')
                            .then(function () { showContainer('ppt-container'); URL.revokeObjectURL(url); })
                            .catch(function () { URL.revokeObjectURL(url); showFallback(); });
                    }
                })
                .catch(showFallback);
        }
    } else if (clientRenderOffice) {
        showFallback();
    }
</script>
</body>
</html>
