<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${fileName != null ? fileName : #messages.msg('file.preview')} + ' - Mini Git Server'">File Preview - Mini Git Server</title>
    <link rel="stylesheet" href="/vendor/highlight.github.min.css">
    <link rel="stylesheet" href="/vendor/docx-preview.min.css">
    <link rel="stylesheet" href="/vendor/jit-viewer.min.css">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f6f8fa;
            color: #24292f;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top bar ─── */
        .top-bar {
            background: #2c3e50;
            color: #fff;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 1rem;
        }
        .top-bar a { color: #cdd9e5; text-decoration: none; font-size: 0.9rem; }
        .top-bar a:hover { color: #fff; }
        .top-bar-left { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; overflow: hidden; }
        .top-bar-left .repo-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ─── Page layout ─── */
        .page-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ─── Sidebar ─── */
        .sidebar {
            width: 260px;
            min-width: 180px;
            background: #fff;
            border-right: 1px solid #d0d7de;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 0.55rem 0.85rem;
            background: #f6f8fa;
            border-bottom: 1px solid #d0d7de;
            font-size: 0.82rem;
            font-weight: 600;
            color: #57606a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tree-list {
            flex: 1;
            overflow-y: auto;
        }
        .tree-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.85rem;
            text-decoration: none;
            color: #24292f;
            border-bottom: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .tree-item:hover { background: #f3f4f6; }
        .tree-item.active {
            background: #dbeafe;
            color: #1a73e8;
            font-weight: 600;
        }
        .tree-item .icon { flex-shrink: 0; }

        /* ─── Main content ─── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ─── File info bar ─── */
        .file-info-bar {
            background: #fff;
            border-bottom: 1px solid #d0d7de;
            padding: 0.65rem 1.1rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            flex-shrink: 0;
        }
        .breadcrumb {
            flex: 1;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .breadcrumb a {
            color: #0969da;
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb .sep { color: #8c959f; margin: 0 0.2rem; }
        .file-meta {
            font-size: 0.82rem;
            color: #57606a;
            white-space: nowrap;
        }
        .actions {
            display: flex;
            gap: 0.45rem;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #f6f8fa;
            color: #24292f;
            border: 1px solid #d0d7de;
            padding: 0.3rem 0.75rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn:hover { background: #eaeef2; }
        .btn.primary {
            background: #0969da;
            color: #fff;
            border-color: #0969da;
        }
        .btn.primary:hover { background: #0550ae; }

        /* ─── Preview area ─── */
        .preview-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem 2rem;
        }

        /* ─── Code / text preview ─── */
        .code-wrap {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            overflow: hidden;
        }
        .code-line-nums {
            display: flex;
        }
        pre {
            margin: 0;
            padding: 1rem;
            overflow-x: auto;
            font-size: 0.88rem;
            line-height: 1.6;
            background: #fff;
        }
        pre code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }

        /* ─── Markdown body ─── */
        .markdown-body {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1.5rem 2rem;
            line-height: 1.7;
            font-size: 1rem;
        }
        .markdown-body h1, .markdown-body h2 {
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 0.4rem;
            margin: 1.2rem 0 0.6rem;
        }
        .markdown-body h3, .markdown-body h4 { margin: 1rem 0 0.5rem; }
        .markdown-body p { margin: 0.6rem 0; }
        .markdown-body pre {
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }
        .markdown-body code {
            background: #f6f8fa;
            border-radius: 3px;
            padding: 0.15em 0.4em;
            font-size: 0.88em;
            font-family: 'SFMono-Regular', Consolas, monospace;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
        }
        .markdown-body blockquote {
            border-left: 4px solid #d0d7de;
            padding-left: 1rem;
            color: #57606a;
            margin: 0.75rem 0;
        }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; }
        .markdown-body th, .markdown-body td { border: 1px solid #d0d7de; padding: 0.4rem 0.8rem; }
        .markdown-body th { background: #f6f8fa; }
        .markdown-body a { color: #0969da; }
        .markdown-body ul, .markdown-body ol { padding-left: 2rem; margin: 0.5rem 0; }
        .markdown-body img { max-width: 100%; }
        .markdown-body hr { border: none; border-top: 1px solid #d0d7de; margin: 1.5rem 0; }

        /* ─── Image preview ─── */
        .image-wrap {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
        }
        .image-wrap img { max-width: 100%; border-radius: 4px; }

        /* ─── PDF ─── */
        .pdf-frame {
            width: 100%;
            height: 75vh;
            border: 1px solid #d0d7de;
            border-radius: 6px;
        }

        /* ─── Office docs ─── */
        .docx-wrapper {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 1rem;
        }
        .excel-container { display: flex; flex-direction: column; gap: 1rem; }
        .excel-container section { overflow-x: auto; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 0.5rem; }
        .excel-container table { border-collapse: collapse; width: auto; min-width: 100%; background: #fff; }
        .excel-container th, .excel-container td { border: 1px solid #d0d7de; padding: 0.35rem 0.6rem; font-size: 0.88rem; white-space: nowrap; }
        .excel-container th { background: #f6f8fa; }
        .excel-container h4 { padding: 0.5rem 0; font-size: 0.9rem; color: #57606a; }

        .office-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 240px;
            color: #57606a;
            font-size: 1rem;
        }

        /* ─── Alerts / notes ─── */
        .alert {
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        .alert-warn { background: #fff8c5; border: 1px solid #d4a72c; color: #7d4e00; }
        .alert-info { background: #ddf4ff; border: 1px solid #54aeff; color: #0550ae; }

        /* ─── Unsupported ─── */
        .unsupported-box {
            background: #fff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            padding: 2rem;
            text-align: center;
            color: #57606a;
        }
        .unsupported-box h3 { margin-bottom: 0.75rem; color: #24292f; }
        .unsupported-box .action-row { margin-top: 1.25rem; display: flex; justify-content: center; gap: 0.75rem; }

        /* ─── Mermaid diagrams ─── */
        .mermaid { text-align: center; margin: 0.75rem 0; }
        .mermaid svg { max-width: 100%; }

        /* ─── Share modal ─── */
        .share-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .share-overlay.open { display: flex; }
        .share-modal {
            background: #fff; border-radius: 10px; padding: 1.5rem; width: 420px; max-width: 95vw;
            box-shadow: 0 8px 32px rgba(0,0,0,.2);
        }
        .share-modal h3 { font-size: 1.05rem; margin-bottom: 1rem; color: #24292f; }
        .share-form-row { margin-bottom: 0.75rem; }
        .share-form-row label { display: block; font-size: 0.83rem; color: #57606a; margin-bottom: 0.3rem; font-weight: 600; }
        .share-form-row select, .share-form-row input[type=text], .share-form-row input[type=password] {
            width: 100%; padding: 0.4rem 0.6rem; border: 1px solid #d0d7de; border-radius: 6px;
            font-size: 0.88rem; background: #f6f8fa;
        }
        .share-form-row select:focus, .share-form-row input:focus { outline: 2px solid #0969da; background: #fff; }
        .share-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
        .share-result { margin-top: 1rem; padding: 0.75rem; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; }
        .share-result label { display: block; font-size: 0.8rem; color: #57606a; margin-bottom: 0.35rem; font-weight: 600; }
        .share-url-row { display: flex; gap: 0.4rem; }
        .share-url-row input { flex: 1; padding: 0.35rem 0.55rem; border: 1px solid #d0d7de; border-radius: 6px; font-size: 0.82rem; background: #fff; }
        .share-revoke-row { margin-top: 0.5rem; font-size: 0.8rem; }
        .share-revoke-row a { color: #d1242f; cursor: pointer; text-decoration: underline; }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            .sidebar { display: none; }
            body { overflow: auto; height: auto; }
            .page-layout { flex-direction: column; }
            .main-content { overflow: visible; }
            .preview-area { overflow: visible; }
        }
    </style>
</head>
<body>

<!-- ═══ Top bar ═══ -->
<div class="top-bar">
    <div class="top-bar-left">
        <span>📁</span>
        <span class="repo-name" th:text="${repoName}">repository.git</span>
        <span th:if="${branch != null}" style="color:#8b949e;">›</span>
        <span th:if="${branch != null}" style="color:#cdd9e5;" th:text="${branch}">main</span>
    </div>
    <div>
        <a th:if="${backUrl != null}" th:href="${backUrl}">← <span th:text="#{ui.back.repo}">Back</span></a>
    </div>
</div>

<!-- ═══ Two-panel layout ═══ -->
<div class="page-layout">

    <!-- Sidebar: file tree of the current directory -->
    <aside class="sidebar">
        <div class="sidebar-header"
             th:text="${sidebarDirPath != null and !sidebarDirPath.isEmpty()} ? '📂 ' + sidebarDirPath : '📂 /'">
            📂 /
        </div>
        <div class="tree-list">
            <!-- Back to parent directory -->
            <a th:if="${sidebarDirPath != null and !sidebarDirPath.isEmpty()}"
               th:href="@{|/admin/repo/${repoName}?branch=${branch}${sidebarParentPath != null and !sidebarParentPath.isEmpty() ? '&path=' + sidebarParentPath : ''}|}"
               class="tree-item">
                <span class="icon">🔙</span><span>..</span>
            </a>
            <!-- Directory and file entries -->
            <a th:each="f : ${sidebarFiles}"
               th:href="${f.type == 'directory'
                   ? '/admin/repo/' + repoName + '?branch=' + (branch != null ? branch : '') + '&path=' + f.path
                   : '/admin/repo/' + repoName + '/file?path=' + f.path + (branch != null ? '&branch=' + branch : '')}"
               th:class="${f.type == 'directory' ? 'tree-item' : (f.name == fileName ? 'tree-item active' : 'tree-item')}"
               th:target="${f.type == 'directory' ? '_self' : '_blank'}"
               th:rel="${f.type == 'directory' ? '' : 'noopener'}">
                <span class="icon" th:text="${f.type == 'directory' ? '📁' : '📄'}">📄</span>
                <span th:text="${f.name}">file.txt</span>
            </a>
        </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content">

        <!-- File info bar -->
        <div class="file-info-bar">
            <!-- Breadcrumb path -->
            <div class="breadcrumb">
                <a th:href="@{|/admin/repo/${repoName}${branch != null ? '?branch=' + branch : ''}|}"
                   th:text="${repoName}">repo</a>
                <span th:each="crumb, iter : ${filePath.split('/')}" th:if="${!filePath.isEmpty()}">
                    <span class="sep">/</span>
                    <span th:if="${iter.last}" style="font-weight:600;" th:text="${crumb}">file</span>
                    <span th:if="${!iter.last}" th:text="${crumb}">dir</span>
                </span>
            </div>

            <!-- File metadata -->
            <div class="file-meta">
                <span th:text="${fileSizeFormatted}">1.2 KB</span>
                <span th:if="${detectedCharset != null}"
                      th:text="' · ' + #{file.encoding} + ': ' + ${detectedCharset}"></span>
            </div>

            <!-- Action buttons -->
            <div class="actions">
                <a th:href="${rawUrl}" class="btn" target="_blank" rel="noopener">
                    <span th:text="#{file.view.raw}">Raw</span>
                </a>
                <a th:href="${downloadUrl}" class="btn primary">
                    ⬇ <span th:text="#{file.download}">Download</span>
                </a>
                <button class="btn" onclick="openShareModal()" title="Share">
                    🔗 <span th:text="#{share.create}">分享</span>
                </button>
            </div>
        </div>

        <!-- Alerts -->
        <div class="preview-area">
            <div th:if="${tooLargeForInline}" class="alert alert-warn" th:text="#{file.note.large}"></div>
            <div th:if="${binaryDetected}" class="alert alert-warn" th:text="#{file.note.binary}"></div>

            <!-- ── Inline previews ── -->
            <div th:if="${previewAvailable and inlinePreview}" th:switch="${previewType}">

                <!-- Plain text -->
                <div th:case="'text'" class="code-wrap">
                    <pre><code th:class="${highlightLanguage != null} ? 'hljs ' + highlightLanguage : 'hljs'" th:text="${textContent}"></code></pre>
                </div>

                <!-- Markdown -->
                <div th:case="'markdown'">
                    <article class="markdown-body" th:utext="${markdownHtml}"></article>
                </div>

                <!-- Image -->
                <div th:case="'image'" class="image-wrap">
                    <img th:src="${imageData}" alt="image preview"/>
                </div>

                <!-- PDF -->
                <div th:case="'pdf'">
                    <iframe th:src="${pdfData}" class="pdf-frame"></iframe>
                </div>

                <!-- Other inline (fallback) -->
                <div th:case="*" class="unsupported-box">
                    <p th:text="#{file.inline.unsupported}">unsupported</p>
                </div>
            </div>

            <!-- ── Office documents (client-side rendering) ── -->
            <div th:if="${clientRenderOffice}">
                <div id="office-status" class="office-progress" th:text="#{file.office.loading}">Loading…</div>
                <!-- JitViewer SDK container (primary renderer) -->
                <div id="jit-viewer-container" style="display:none; width:100%; min-height:600px;"></div>
                <!-- Legacy containers (fallback when JitViewer is unavailable) -->
                <div th:if="${previewType == 'word'}" id="docx-container" class="docx-wrapper" style="display:none;"></div>
                <div th:if="${previewType == 'excel'}" id="excel-container" class="excel-container" style="display:none;"></div>
                <div th:if="${previewType == 'powerpoint'}" id="ppt-container" class="docx-wrapper" style="display:none;"></div>

                <!-- Fallback -->
                <div id="office-fallback" style="display:none;" class="unsupported-box">
                    <h3>📄 <span th:text="#{file.office.info}">Office Document Info</span></h3>
                    <p th:text="|${#messages.msg('file.office.filename')}: ${fileName}|"></p>
                    <p th:text="|${#messages.msg('file.office.filesize')}: ${fileSizeFormatted}|"></p>
                    <p th:text="|${#messages.msg('file.office.filetype')}: ${previewType}|"></p>
                    <div class="alert alert-info" style="margin-top:1rem; text-align:left;">
                        <strong>💡 <span th:text="#{file.office.tips}">Tips</span></strong><br/>
                        • <span th:text="#{file.office.tip1}">tip1</span><br/>
                        • <span th:text="#{file.office.tip2}">tip2</span><br/>
                        • <span th:text="#{file.office.tip3}">tip3</span>
                    </div>
                    <div class="action-row">
                        <a th:href="${downloadUrl}" class="btn primary">📥 <span th:text="#{file.office.download.now}">Download now</span></a>
                        <a th:href="${rawUrl}" class="btn" target="_blank">🔍 <span th:text="#{file.office.view.raw}">View raw</span></a>
                    </div>
                </div>
            </div>

            <!-- ── No preview available ── -->
            <div th:if="${!previewAvailable and !tooLargeForInline and !binaryDetected}" class="unsupported-box">
                <h3>📄 <span th:text="${fileName}">file.bin</span></h3>
                <p th:text="#{file.preview.unsupported}">unsupported</p>
                <p style="margin-top:0.35rem; font-size:0.85rem;" th:text="#{file.preview.actions}">actions</p>
                <div class="action-row">
                    <a th:href="${downloadUrl}" class="btn primary">⬇ <span th:text="#{file.download}">Download</span></a>
                    <a th:href="${rawUrl}" class="btn" target="_blank">🔍 <span th:text="#{file.view.raw}">Raw</span></a>
                </div>
            </div>
        </div><!-- /preview-area -->
    </main>
</div><!-- /page-layout -->

<!-- ═══ Share modal ═══ -->
<div class="share-overlay" id="share-overlay" onclick="if(event.target===this)closeShareModal()">
    <div class="share-modal">
        <h3>🔗 <span th:text="#{share.title}">分享文件</span></h3>
        <div id="share-form-panel">
            <div class="share-form-row">
                <label th:text="#{share.expiry}">有效期</label>
                <select id="share-expiry">
                    <option value="0" th:text="#{share.expiry.never}">永不过期</option>
                    <option value="1" th:text="#{share.expiry.1h}">1 小时</option>
                    <option value="24" th:text="#{share.expiry.24h}">24 小时</option>
                    <option value="168" th:text="#{share.expiry.7d}">7 天</option>
                    <option value="720" th:text="#{share.expiry.30d}">30 天</option>
                </select>
            </div>
            <div class="share-form-row">
                <label th:text="#{share.password}">访问密码</label>
                <input type="password" id="share-password" th:placeholder="#{share.password.placeholder}" autocomplete="off"/>
            </div>
            <div class="share-actions">
                <button class="btn" onclick="closeShareModal()" th:text="#{ui.cancel}">取消</button>
                <button class="btn primary" onclick="createShareLink()" th:text="#{share.create}">创建分享链接</button>
            </div>
        </div>
        <div id="share-result-panel" style="display:none;">
            <div class="share-result">
                <label th:text="#{share.link}">分享链接</label>
                <div class="share-url-row">
                    <input type="text" id="share-url-input" readonly onclick="this.select()"/>
                    <button class="btn" id="share-copy-btn" onclick="copyShareLink()" th:text="#{share.copy}">复制</button>
                </div>
                <div class="share-revoke-row">
                    <a onclick="revokeShareLink()" th:text="#{share.revoke}">撤销链接</a>
                </div>
            </div>
            <div class="share-actions">
                <button class="btn" onclick="closeShareModal()" th:text="#{ui.cancel}">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- Local vendor scripts -->
<script src="/vendor/highlight.common.min.js"></script>
<script src="/vendor/docx-preview.min.js"></script>
<script src="/vendor/xlsx.full.min.js"></script>
<script src="/vendor/jszip.min.js"></script>
<script src="/vendor/pptxjs.min.js"></script>
<script src="/vendor/mermaid.min.js"></script>
<!-- JitViewer SDK: unified multi-format document viewer -->
<script src="/vendor/jit-viewer.min.js"></script>

<script th:inline="javascript">
    // ── Syntax highlighting ──
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('pre code.hljs').forEach(function (block) {
            if (window.hljs) window.hljs.highlightElement(block);
        });

        // ── Mermaid: convert fenced code blocks inside markdown to diagrams ──
        document.querySelectorAll('.markdown-body pre code.language-mermaid').forEach(function (el) {
            var pre = el.parentElement;
            var div = document.createElement('div');
            div.className = 'mermaid';
            div.textContent = el.textContent;
            pre.parentNode.replaceChild(div, pre);
        });
        if (window.mermaid) {
            mermaid.initialize({ startOnLoad: true, securityLevel: 'strict' });
        }
    });

    // ── Office client-side rendering ──
    var clientRenderOffice = /*[[${clientRenderOffice}]]*/ false;
    var rawUrl             = /*[[${rawUrl}]]*/ '';
    var previewType        = /*[[${previewType}]]*/ 'binary';
    var fileName           = /*[[${fileName}]]*/ '';

    function showFallback() {
        var s = document.getElementById('office-status');
        var f = document.getElementById('office-fallback');
        if (s) s.style.display = 'none';
        if (f) f.style.display = 'block';
    }

    function showContainer(id) {
        var s = document.getElementById('office-status');
        var c = document.getElementById(id);
        if (s) s.style.display = 'none';
        if (c) c.style.display = c.classList.contains('excel-container') ? 'flex' : 'block';
    }

    if (clientRenderOffice && rawUrl) {
        // ── Primary: JitViewer SDK ──
        if (window.JitViewer && typeof window.JitViewer.createViewer === 'function') {
            try {
                var viewer = window.JitViewer.createViewer({
                    file: rawUrl,
                    filename: fileName,
                    toolbar: true,
                    theme: 'light',
                    onError: function () {
                        console.warn('[JitViewer] Rendering failed, switching to legacy library fallback.');
                        renderWithLegacyLibs();
                    }
                });
                viewer.mount('#jit-viewer-container');
                showContainer('jit-viewer-container');
            } catch (e) {
                console.warn('[JitViewer] SDK threw an error, switching to legacy library fallback:', e);
                renderWithLegacyLibs();
            }
        } else {
            // ── Fallback: existing per-format libraries ──
            renderWithLegacyLibs();
        }
    } else if (clientRenderOffice) {
        showFallback();
    }

    function renderWithLegacyLibs() {
        var libOk = (previewType === 'word'       && !!window.docx && typeof window.docx.renderAsync === 'function') ||
                    (previewType === 'excel'      && !!window.XLSX && typeof window.XLSX.read === 'function')         ||
                    (previewType === 'powerpoint' && !!window.PPTX && typeof window.PPTX.load === 'function');

        if (!libOk) { showFallback(); return; }

        fetch(rawUrl)
            .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.arrayBuffer(); })
            .then(function (buf) {
                if (!buf || buf.byteLength === 0) throw new Error('Empty file');
                if (previewType === 'word') {
                    window.docx.renderAsync(buf, document.getElementById('docx-container'), null, { experimental: true })
                        .then(function () { showContainer('docx-container'); })
                        .catch(showFallback);
                } else if (previewType === 'excel') {
                    try {
                        var wb = window.XLSX.read(buf, { type: 'array', cellFormula: false, cellHTML: false });
                        var con = document.getElementById('excel-container');
                        con.innerHTML = '';
                        var ok = false;
                        wb.SheetNames.forEach(function (name, i) {
                            var sh = wb.Sheets[name];
                            if (sh) {
                                var html = window.XLSX.utils.sheet_to_html(sh, {
                                    header: '<h4>Sheet ' + (i + 1) + ': ' + name + '</h4>'
                                });
                                var sec = document.createElement('section');
                                sec.innerHTML = html;
                                con.appendChild(sec);
                                ok = true;
                            }
                        });
                        if (ok) showContainer('excel-container'); else throw new Error('No sheets');
                    } catch (e) { showFallback(); }
                } else if (previewType === 'powerpoint') {
                    var blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
                    var url  = URL.createObjectURL(blob);
                    window.PPTX.load(url, '#ppt-container')
                        .then(function () { showContainer('ppt-container'); URL.revokeObjectURL(url); })
                        .catch(function () { URL.revokeObjectURL(url); showFallback(); });
                }
            })
            .catch(showFallback);
    }

    // ── Share modal ──
    var shareRepoName  = /*[[${repoName}]]*/ '';
    var shareFilePath  = /*[[${filePath}]]*/ '';
    var shareBranch    = /*[[${branch}]]*/ '';
    var shareToken     = null;

    function openShareModal() {
        document.getElementById('share-form-panel').style.display = 'block';
        document.getElementById('share-result-panel').style.display = 'none';
        shareToken = null;
        document.getElementById('share-overlay').classList.add('open');
    }

    function closeShareModal() {
        document.getElementById('share-overlay').classList.remove('open');
    }

    function createShareLink() {
        var expiry   = document.getElementById('share-expiry').value;
        var password = document.getElementById('share-password').value;
        var csrf     = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        var csrfHdr  = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        var body = 'repoName=' + encodeURIComponent(shareRepoName) +
                   '&filePath=' + encodeURIComponent(shareFilePath) +
                   '&branch=' + encodeURIComponent(shareBranch || '') +
                   '&expiresInHours=' + encodeURIComponent(expiry) +
                   '&password=' + encodeURIComponent(password);
        var headers = {'Content-Type': 'application/x-www-form-urlencoded'};
        headers[csrfHdr] = csrf;
        fetch('/admin/share/create', {method: 'POST', headers: headers, body: body})
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.shareUrl) {
                    shareToken = data.token;
                    document.getElementById('share-url-input').value = data.shareUrl;
                    document.getElementById('share-form-panel').style.display = 'none';
                    document.getElementById('share-result-panel').style.display = 'block';
                } else {
                    alert('Failed to create share link');
                }
            })
            .catch(function() { alert('Error creating share link'); });
    }

    function copyShareLink() {
        var input = document.getElementById('share-url-input');
        input.select();
        navigator.clipboard.writeText(input.value).then(function() {
            var btn = document.getElementById('share-copy-btn');
            var orig = btn.textContent;
            btn.textContent = '✓';
            setTimeout(function() { btn.textContent = orig; }, 1500);
        }).catch(function() { document.execCommand('copy'); });
    }

    function revokeShareLink() {
        if (!shareToken) return;
        var csrf     = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        var csrfHdr  = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
        var headers  = {};
        headers[csrfHdr] = csrf;
        fetch('/admin/share/' + shareToken + '/revoke', {method: 'POST', headers: headers})
            .then(function(r) { return r.json(); })
            .then(function() {
                document.getElementById('share-url-input').value = '(已撤销)';
                shareToken = null;
            })
            .catch(function() { alert('Revoke failed'); });
    }
</script>
</body>
</html>
