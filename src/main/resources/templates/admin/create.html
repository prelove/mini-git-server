<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{create.title} + ' - ' + #{ui.title}">Create Repository - Mini Git Server</title>
    <style>
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f7fa;margin:0;line-height:1.45}
        .header{background:#2c3e50;color:#fff;padding:.7rem 1rem}.header-content{max-width:980px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
        .container{max-width:660px;margin:16px auto;padding:0 12px}.card{background:#fff;padding:16px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
        .form-group{margin-bottom:10px}label{display:block;margin-bottom:4px;font-size:.9rem;font-weight:600}.help-text{font-size:.82rem;color:#666}
        input{width:100%;padding:9px;border:1px solid #d0d7de;border-radius:6px}.btn{padding:.5rem .9rem;border-radius:6px;text-decoration:none;border:none;cursor:pointer}
        .btn-primary{background:#3498db;color:#fff}.btn-secondary{background:#95a5a6;color:#fff}.actions{display:flex;gap:8px;margin-top:12px}.alert-error{background:#f8d7da;color:#721c24;padding:.55rem;border-radius:6px;margin-bottom:10px}
    </style>
</head>
<body>
<header class="header"><div class="header-content"><h1 th:text="#{ui.title}">Mini Git Server</h1><a href="/admin" style="color:#fff" th:text="'← ' + #{ui.back.admin}">Back</a></div></header>
<div class="container"><div class="card">
    <h2 th:text="'➕ ' + #{create.title}">Create Repository</h2>
    <div th:if="${error}" class="alert-error" th:text="${error}"></div>
    <form th:action="@{/admin/create}" method="post">
        <div class="form-group"><label for="name" th:text="#{create.repo.name}">Repository name</label>
            <input type="text" id="name" name="name" required th:placeholder="#{create.repo.placeholder}" pattern="[A-Za-z0-9_-]+">
            <div class="help-text" th:text="#{create.repo.help}"></div>
        </div>
        <div class="actions"><button type="submit" class="btn btn-primary" th:text="#{ui.create}">Create</button><a href="/admin" class="btn btn-secondary" th:text="#{ui.cancel}">Cancel</a></div>
    </form>
</div></div>
</body></html>
