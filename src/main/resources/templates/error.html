<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{error.title} + ' - ' + #{ui.title}">Error - Mini Git Server</title>
    <style>
        body {font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f4f6f8;margin:0;padding:14px;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .error-container {background:#fff;padding:20px;border-radius:10px;box-shadow:0 3px 12px rgba(0,0,0,.08);text-align:center;max-width:480px;width:100%;}
        .error-icon {font-size:3rem;margin-bottom:.5rem;}
        .error-title {color:#d9534f;margin:.2rem 0 .5rem;}
        .error-message {color:#666;margin-bottom:1rem;}
        .btn {background:#3498db;color:white;padding:.55rem 1rem;border-radius:6px;text-decoration:none;display:inline-block;}
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">❌</div>
    <h1 class="error-title" th:text="#{error.heading}">Something went wrong</h1>
    <p class="error-message" th:if="${error}" th:text="${error}"></p>
    <p class="error-message" th:unless="${error}" th:text="#{error.default.message}">An unknown error occurred.</p>
    <a href="/admin" class="btn" th:text="#{ui.return.home}">Return Home</a>
</div>
</body>
</html>
